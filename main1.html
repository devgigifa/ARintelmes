
<!-- FAZ: lê o qr code pela camera do celular
          redireciona para o site
          botões clicam (aparecer alert)
-->

<!-- NÃO FAZ: botões não clicam (aparecer grandbox)
              abre a camera pelo navegador
              lê o marcador
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A-frame test</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  
  <script>
    AFRAME.registerComponent('maintenance-cursor', {
      init: function() {
        this.el.addEventListener('click', function() {
          alert("manutenção");
        });
      }
    });

    AFRAME.registerComponent('status-cursor', {
      init: function() {
        this.el.addEventListener('click', function() {
          alert("status");
        });
      }
    });
  </script>
</head>
<body style="margin: 0px; overflow:hidden">
  <a-scene>
    <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable; far: 10; showLine: true"></a-entity>  
    <a-box id="grandbox" position="0 2.25 -3" rotation="0 0 0" color="#00a335" scale="2 2 0.5"></a-box>
    <a-box id="rightbox" position="0.6 1 -3" rotation="0 0 0" color="#50788a" scale="0.8  0.2 0.3" maintenance-cursor class="clickable"></a-box>
    <a-box id="leftbox" position="-0.6 1 -3" rotation="0 0 0" color="#50788a" scale="0.8  0.2 0.3" status-cursor class="clickable"></a-box>
    <a-text value="maintenance" color="white" scale="1.8 1.8 1.8" position="0.5 1.1 -2.4" align="center" width="1.3"></a-text>
    <a-text value="status" color="white" scale="1.8 1.8 1.8" position="-0.5 1.1 -2.4" align="center" width="1.3"></a-text>    
  </a-scene>
</body>
</html>
