
<!-- adicionando elementos em javascript, não testado -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/jsqr@1.3.1/dist/jsQR.js"></script>
    <style>
        #video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        #ar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: transparent;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="ar-overlay"></div>
</body>
    <script>
        let video = document.getElementById('video');
        let canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        let scene;
        let marker;


        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
           .then(stream => {
                video.srcObject = stream;
                video.play();
                setInterval(() => {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let qrCode = jsQR(imageData.data, imageData.width, imageData.height);
                    if (qrCode) {
                        if (!scene) {
                            // Load the A-Frame scene into the overlay element
                            const overlay = document.getElementById('ar-overlay');
                            scene = document.createElement('a-scene');
                            scene.setAttribute('vr-mode-ui', 'enabled: false');
                            scene.setAttribute('embedded', '');
                            scene.setAttribute('arjs', 'debugUIEnabled: false;');


                            // Add the A-Frame scene to the overlay element
                            overlay.appendChild(scene);


                            // Add the A-Frame entities
                            marker = document.createElement('a-marker');
                            marker.setAttribute('preset', 'hiro');
                            scene.appendChild(marker);


                            const box = document.createElement('a-box');
                            box.setAttribute('id', 'grandbox');
                            box.setAttribute('position', '0 2.3 -3');
                            box.setAttribute('rotation', '0 0 0');
                            box.setAttribute('color', '#00a335');
                            box.setAttribute('scale', '2 2 1');
                            marker.appendChild(box);


                            const rightBox = document.createElement('a-box');
                            rightBox.setAttribute('id', 'rightbox');
                            rightBox.setAttribute('position', '0.6 1 -3');
                            rightBox.setAttribute('rotation', '0 0 0');
                            rightBox.setAttribute('color', '#50788a');
                            rightBox.setAttribute('scale', '0.8 0.2 1');
                            rightBox.setAttribute('class', 'clickable');
                            marker.appendChild(rightBox);


                            const leftBox = document.createElement('a-box');
                            leftBox.setAttribute('id', 'leftbox');
                            leftBox.setAttribute('position', '-0.6 1 -3');
                            leftBox.setAttribute('rotation', '0 0 0');
                            leftBox.setAttribute('color', '#50788a');
                            leftBox.setAttribute('scale', '0.8 0.2 1');
                            leftBox.setAttribute('class', 'clickable');
                            marker.appendChild(leftBox);


                            const text = document.createElement('a-text');
                            text.setAttribute('value', 'manutencao');
                            text.setAttribute('color', 'white');
                            text.setAttribute('scale', '1.8 1.8 1.8');
                            text.setAttribute('position', '0.6 1 -2.5');
                            text.setAttribute('align', 'center');
                            text.setAttribute('width', '1.5');
                            marker.appendChild(text);


                            const text2 = document.createElement('a-text');
                            text2.setAttribute('value', 'status');
                            text2.setAttribute('color', 'white');
                            text2.setAttribute('scale', '1.8 1.8 1.8');
                            text2.setAttribute('position', '-0.6 1 -2.5');
                            text2.setAttribute('align', 'center');
                            text2.setAttribute('width', '1.5');
                            marker.appendChild(text2);


                            // Enable AR mode
                            scene.addEventListener('loaded', () => {
                                scene.arModeEnabled = true;
                            });
                        } else {
                            // Reuse the existing scene
                            scene.arModeEnabled = true;
                        }
                    } else {
                        // Disable AR mode
                        scene.arModeEnabled = false;
                    }    
                })  
            })  
            .catch(error => {
            console.error('Erro ao acessar a câmera:', error);
            })
    </script>
</html>
