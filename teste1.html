<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>A-frame test</title>
        <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
        <script src="https://unpkg.com/jsqr@1.3.1/dist/jsQR.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

        <script>
            AFRAME.registerComponent('maintenance-cursor', {
                init: function() {
                    var marker = this.el;
                    this.rightbox = document.queryselector('rightbox')

                    marker.addEventListener('clickable', function() {
                        alert("manutenção");
                        // this?
                        const boxMaintenance = document.createElement('a-box');

                        boxMaintenance.setAttribute('type', 'a-box');
                        boxMaintenance.setAttribute('position', '0 2.3 -3');
                        boxMaintenance.setAttribute('rotation', '0 0 0');
                        boxMaintenance.setAttribute('color', '#00a335');
                        boxMaintenance.setAttribute('scale', '2 2 1');
                        boxMaintenance.append(document.createTextNode(''))
                        document.body.append(boxMaintenance)
                        // return this.boxMaintenace?
                        //   ainda não aparece a caixa ao clicar no botão
                    }.bind(this));
                }
            });

            AFRAME.registerComponent('status-cursor', {
                init: function() {
                    this.el.addEventListener('clickable', function() {
                        alert("status");
                
                        const boxStatus = document.createElement('a-box');
                        boxStatus.setAttribute('type', 'a-box');
                        boxStatus.setAttribute('position', '0 2.3 -3');
                        boxStatus.setAttribute('rotation', '0 0 0');
                        boxStatus.setAttribute('color', '#00a335');
                        boxStatus.setAttribute('scale', '2 2 1');
                        boxStatus.append(document.createTextNode(''))
                        document.body.append(boxStatus)
                        //   ainda não aparece a caixa ao clicar no botão
                    });
                }
            });
        </script>

        <!-- <style>
            #video {
                width: 100%;
                height: 100vh;
                object-fit: cover;
            }
        </style> -->
    </head>

    <body style="margin: 0px; overflow:hidden">
        <a-scene 
            vr-mode-ui="enabled: false;"
            embedded arjs="sourceType: webcam; debugUIEnabled: false;"
            id="scene"
        >
            <a-marker 
                id="marker" 
                type="pattern" 
                url="https://cdn.glitch.global/469bf26b-d54a-42ba-b93a-9badfef4d1e2/pattern-frame1.patt?v=1722364839104" 
                position="0 0 0" 
                rotation="0 0 0"
                raycaster="objects: .clickable"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <!-- <a-entity cursor="rayOrigin: mouse;  raycaster="objects: .clickable; far: 10; showLine: true"></a-entity>   -->
                <a-box 
                    id="rightbox" 
                    position="0.6 1 -3" 
                    rotation="0 0 0" 
                    color="#50788a" 
                    scale="0.8  0.2 0.3" 
                    maintenance-cursor class="clickable"
                ></a-box>

                <a-box 
                    id="leftbox" 
                    position="-0.6 1 -3" 
                    rotation="0 0 0" 
                    color="#50788a" 
                    scale="0.8  0.2 0.3" 
                    status-cursor class="clickable"
                ></a-box>

                <a-text value="maintenance" color="white" scale="1.8 1.8 1.8" position="0.5 1.1 -2.5" align="center" width="1.3"></a-text>
                <a-text value="status" color="white" scale="1.8 1.8 1.8" position="-0.5 1.1 -2.5" align="center" width="1.3"></a-text>
                
                <a-entity camera cursor="fuse: false; rayOrigin: mouse;"></a-entity>
                    <!-- <video id="video" autoplay playsinline></video> -->
                    <!-- or a-entity camera> -->
            </a-marker> 
        </a-scene>
    </body>
</html>
